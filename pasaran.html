        // Fungsi untuk mendapatkan penjelasan berdasarkan hari dan pasaran
        function getExplanation(day, pasaran) {
            const key = `${day} ${pasaran}`;
            return pasaranMeanings[key] || {
                karakter: `${day} ${pasaran} - Karakter unik dengan kombinasi hari dan pasaran`,
                sifat: `Sifat khas ${day} ${pasaran}`,
                kelebihan: `Kelebihan ${day} ${pasaran}`,
                kekurangan: `Kekurangan ${day} ${pasaran}`,
                watak: `Watak ${day} ${pasaran}`,
                elemen: ['Api', 'Tanah', 'Angin', 'Air'][Math.floor(Math.random() * 4)],
                warnaKeberuntungan: ['Merah', 'Kuning', 'Putih', 'Hitam', 'Hijau'][Math.floor(Math.random() * 5)],
                karier: 'Beragam sesuai minat dan bakat'
            };
        }

        function convertDate() {
            const dateInput = document.getElementById('dateInput').value;
            
            if (!dateInput) {
                alert('Silakan pilih tanggal terlebih dahulu!');
                return;
            }

            const date = new Date(dateInput);
            const daysOfWeek = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const pasaranCycle = ['Legi', 'Pahing', 'Pon', 'Wage', 'Kliwon'];

            const dayOfWeek = date.getDay();
            
            // PERBAIKAN: Menggunakan referensi yang AKURAT
            // 1 Januari 1900 adalah Senin Wage (berdasarkan primbon yang benar)
            // Namun untuk memudahkan, kita gunakan patokan yang sudah teruji:
            // 1 Januari 2024 adalah Senin Pahing (berdasarkan kalender Jawa 2024)
            
            const referenceDate = new Date('2024-01-01'); // 1 Januari 2024
            const referencePasaranIndex = 1; // Pahing (indeks 1 dari [Legi, Pahing, Pon, Wage, Kliwon])
            
            // Hitung selisih hari
            const targetDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            const refDate = new Date(referenceDate.getFullYear(), referenceDate.getMonth(), referenceDate.getDate());
            
            const timeDifference = targetDate - refDate;
            const dayDifference = Math.floor(timeDifference / (1000 * 60 * 60 * 24));
            
            // Pasaran berganti setiap 5 hari
            let pasaranIndex = (referencePasaranIndex + dayDifference) % 5;
            if (pasaranIndex < 0) pasaranIndex += 5;
            
            const pasaran = pasaranCycle[pasaranIndex];
            const dayName = daysOfWeek[dayOfWeek];

            // Hitung neptu
            const neptuHariValue = neptuHari[dayName];
            const neptuPasaranValue = neptuPasaran[pasaran];
            const totalNeptu = neptuHariValue + neptuPasaranValue;

            // Menampilkan hasil di tabel
            const tbody = document.querySelector('#resultTable tbody');
            const formattedDate = date.toLocaleDateString('id-ID', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
            
            tbody.innerHTML = `<tr>
                <td>${formattedDate}</td>
                <td>${dayName} <span class="neptu-badge">${neptuHariValue}</span></td>
                <td>${pasaran} <span class="neptu-badge">${neptuPasaranValue}</span></td>
                <td><strong style="color: #ff9900; font-size: 1.2em;">${totalNeptu}</strong></td>
            </tr>`;

            // Tampilkan total neptu
            const totalNeptuDiv = document.getElementById('totalNeptu');
            totalNeptuDiv.style.display = 'block';
            totalNeptuDiv.innerHTML = `✨ Total Neptu: <strong>${totalNeptu}</strong> (${dayName} ${neptuHariValue} + ${pasaran} ${neptuPasaranValue}) ✨`;

            // Mendapatkan dan menampilkan penjelasan
            const explanation = getExplanation(dayName, pasaran);
            const explanationContent = document.getElementById('explanationContent');
            const selectedDay = document.getElementById('selectedDay');
            
            selectedDay.textContent = `📖 Penjelasan ${dayName} ${pasaran} (Neptu: ${totalNeptu})`;
            
            explanationContent.innerHTML = `
                <div class="info-content">
                    <div class="info-card">
                        <h4>🌟 Karakter & Sifat</h4>
                        <p><strong>Karakter:</strong> ${explanation.karakter}</p>
                        <p><strong>Sifat:</strong> ${explanation.sifat}</p>
                        <p><strong>Watak:</strong> ${explanation.watak}</p>
                    </div>
                    <div class="info-card">
                        <h4>⚡ Kelebihan & Kekurangan</h4>
                        <p><strong>Kelebihan:</strong> ${explanation.kelebihan}</p>
                        <p><strong>Kekurangan:</strong> ${explanation.kekurangan}</p>
                    </div>
                    <div class="info-card">
                        <h4>🍀 Pembawa & Karier</h4>
                        <p><strong>Elemen:</strong> ${explanation.elemen}</p>
                        <p><strong>Warna Keberuntungan:</strong> ${explanation.warnaKeberuntungan}</p>
                        <p><strong>Karier Cocok:</strong> ${explanation.karier}</p>
                    </div>
                </div>
                <p style="color: #999; font-size: 0.9em; margin-top: 20px; text-align: center; font-style: italic;">
                    *Berdasarkan primbon Jawa. Setiap individu unik, jadikan ini sebagai referensi.
                </p>
            `;
        }

        // Menambahkan event listener untuk enter key
        document.getElementById('dateInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                convertDate();
            }
        });

        // PERBAIKAN: Set default date ke hari ini (tanggal sistem)
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        const todayFormatted = `${year}-${month}-${day}`;
        document.getElementById('dateInput').value = todayFormatted;
        
        // Jalankan konversi untuk tanggal default
        window.onload = function() {
            convertDate();
        };
    </script>
